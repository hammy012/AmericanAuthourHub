        img { max-width: 100%; max-height: 250px; object-fit: contain; }
    </style>
</head>

        <div class="card">

            <img src="/assets/imgs/main3.png">
        </div>
        <div class="card">
            <h3>booknew1.png</h3>
            <img src="/assets/imgs/booknew1.png">
        </div>
        <div class="card">
            <h3>booknew2.png</h3>
            <img src="/assets/imgs/booknew2.png">
        </div>
        <div class="card">
            <h3>booknew3.png</h3>
            <img src="/assets/imgs/booknew3.png">
        </div>
        <div class="card">
            <h3>about.png</h3>
            <img src="/assets/imgs/about.png">
        </div>
    </div>
</body>
</html>
